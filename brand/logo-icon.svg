<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accent-dim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Transparent background, just icon -->

  <!-- Left stroke -->
  <path d="M160 400 L256 80" stroke="url(#accent-dim)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right stroke -->
  <path d="M352 400 L256 80" stroke="url(#accent-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Crossbar -->
  <path d="M200 290 L312 290" stroke="url(#accent-grad)" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Endpoint dot -->
  <circle cx="256" cy="364" r="12" fill="#38bdf8" opacity="0.9"/>

  <!-- Subtle nodes -->
  <circle cx="184" cy="322" r="6" fill="#7dd3fc" opacity="0.5"/>
  <circle cx="328" cy="234" r="6" fill="#7dd3fc" opacity="0.5"/>
</svg>
