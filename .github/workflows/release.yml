name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag, for example v1.4.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build and package
        run: npm run dist:win

      - name: Generate release notes
        shell: pwsh
        run: |
          $previousTag = git tag --sort=-version:refname | Select-Object -Skip 1 -First 1
          if ($previousTag) {
            $log = git log "$previousTag..HEAD" --pretty=format:"- %s (%h)" --no-merges
          } else {
            $log = git log HEAD --pretty=format:"- %s (%h)" --no-merges
          }
          if (-not $log) { $log = '- Initial release' }
          $log | Out-File -FilePath changelog.txt -Encoding utf8

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ApiPreview ${{ inputs.tag || github.ref_name }}
          body_path: changelog.txt
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, 'beta') || contains(inputs.tag || github.ref_name, 'alpha') || contains(inputs.tag || github.ref_name, 'rc') }}
          files: |
            release/*.exe
            release/*.zip
            release/*.msi
            release/*.blockmap
            release/latest*.yml
            release/*.dmg
            release/*.AppImage
